<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Premier League Fixtures</title>
    <meta
      name="description"
      content="An unofficial Premier League fixture viewer — fixtures in your timezone, the live table, season stats, and every final table since 1992."
    />
    <meta name="theme-color" content="#12121a" />
    <!-- Relative paths throughout: this ships to GitHub Pages under a repo
         subpath as well as to the Netlify root, so a leading slash would
         break the Pages copy. -->
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="PL Fixtures" />
    <link rel="manifest" href="./manifest.webmanifest" />

    <meta property="og:title" content="Premier League Fixtures" />
    <meta
      property="og:description"
      content="Fixtures in your timezone, the live table, season stats, and every final table since 1992."
    />
    <meta property="og:type" content="website" />
    <!-- The share image and URL must be absolute; a relative path is ignored by
         crawlers. This names the Netlify host as canonical — the GitHub Pages
         copy shares the same image from its own origin at ./og-image.png but a
         single og:url has to point somewhere. -->
    <meta property="og:url" content="https://premier-league-viewer.netlify.app/" />
    <meta property="og:image" content="https://premier-league-viewer.netlify.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Premier League Fixtures — fixtures, table and stats" />
    <meta property="og:site_name" content="Premier League Fixtures" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Premier League Fixtures" />
    <meta
      name="twitter:description"
      content="Fixtures in your timezone, the live table, season stats, and every final table since 1992."
    />
    <meta name="twitter:image" content="https://premier-league-viewer.netlify.app/og-image.png" />

    <script>
      // Resolve the theme before first paint. Doing this in React would mean a
      // frame of the wrong background — a white flash on a dark-theme device.
      ;(function () {
        try {
          var t = localStorage.getItem('pl:theme')
          if (!t) t = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark'
          document.documentElement.dataset.theme = t
        } catch (e) {
          document.documentElement.dataset.theme = 'dark'
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
