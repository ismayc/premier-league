<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Premier League Fixtures</title>
    <meta
      name="description"
      content="An unofficial Premier League fixture viewer — fixtures in your timezone, the live table, season stats, and every final table since 1992."
    />
    <meta name="theme-color" content="#12121a" />
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="manifest" href="./manifest.webmanifest" />

    <meta property="og:title" content="Premier League Fixtures" />
    <meta
      property="og:description"
      content="Fixtures in your timezone, the live table, season stats, and every final table since 1992."
    />
    <meta property="og:type" content="website" />

    <script>
      // Resolve the theme before first paint. Doing this in React would mean a
      // frame of the wrong background — a white flash on a dark-theme device.
      ;(function () {
        try {
          var t = localStorage.getItem('pl:theme')
          if (!t) t = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark'
          document.documentElement.dataset.theme = t
        } catch (e) {
          document.documentElement.dataset.theme = 'dark'
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
